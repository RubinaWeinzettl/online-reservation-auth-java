services:
  mysql:
    image: mysql:8.4
    container_name: or-auth-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
      MYSQL_USER: authuser
      MYSQL_PASSWORD: authpassword
    volumes:
      - or-auth-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build: .
    container_name: or-auth-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      DB_URL: jdbc:mysql://or-auth-db:3306/auth_db
      DB_USER: authuser
      DB_PASSWORD: authpassword

  phpmyadmin:
    image: phpmyadmin:5
    container_name: or-auth-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8082:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306

volumes:
  or-auth-db-data: