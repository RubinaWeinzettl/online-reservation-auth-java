name: Online Reservierung Auth Java CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  WAR_PATH: auth-service/target/auth-service.war

jobs:
  # --- STAGE 1: BUILD & TEST ---
  build:
    runs-on: arc-runner-set
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Maven
        uses: s4u/setup-maven-action@v1.20.0
        with:
          maven-version: '3.9.9'

      - name: Build with Maven
        run: mvn -f auth-service/pom.xml clean package -DskipTests
            #- name: Run Unit Tests
            #  run: mvn test

      - name: Upload Artifact (WAR)
        uses: actions/upload-artifact@v4
        with:
          name: or-auth-war
          path: ${{ env.WAR_PATH }}

